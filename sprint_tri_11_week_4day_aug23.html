    ],
    tips: ["Race morning: eat 2–2.5 hrs before start. Something you've practiced — nothing new", "Swim start: seed yourself toward the outside/back to avoid contact. Ease into the first 100m", "T1 (swim→bike): goggles off, helmet on BEFORE touching the bike — marshals enforce this", "T2 (bike→run): rack bike first, helmet off, then run shoes. Go easy the first 5 min — legs will settle", "Finish line: take it all in. 11 weeks ago you started from near zero."]
  }
];

const pillMap = { swim: "pill-swim", bike: "pill-bike", run: "pill-run", rest: "pill-rest", brick: "pill-brick", race: "pill-race" };
const pillLabel = { swim: "Swim", bike: "Bike", run: "Run", rest: "Rest", brick: "Brick", race: "Race" };

let currentWeek = 1;

function renderTabs() {
  const container = document.getElementById("weekTabs");
  container.innerHTML = weeks.map(w =>
    `<button class="week-tab ${w.num === currentWeek ? 'active' : ''}" onclick="setWeek(${w.num})">Wk ${w.num}<br><span style="font-size:10px;opacity:0.7;">${w.dateRange.split('–')[0].trim()}</span></button>`
  ).join("");
}

function renderWeek(w) {
  const maxSwim = 800, maxBike = 65, maxRun = 45;
  const content = document.getElementById("weekContent");
  content.innerHTML = `
    <div class="week-header">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
        <p class="week-title" style="margin:0;">${w.title}</p>
        <span class="date-chip">${w.dateRange}</span>
      </div>
      <p class="week-subtitle">${w.subtitle}</p>
    </div>
    <div class="week-meta">
      <span class="meta-badge"><i class="ti ti-clock" aria-hidden="true"></i> ${w.totalTime}</span>
      <span class="meta-badge"><i class="ti ti-target" aria-hidden="true"></i> ${w.focus}</span>
      <span class="meta-badge">Phase ${w.phase}</span>
    </div>
    <div style="margin-bottom:1.25rem;">
      <div class="progress-row"><span class="progress-label">Swim</span><div class="progress-bar-bg"><div class="progress-fill progress-swim" style="width:${Math.round((w.swimM/maxSwim)*100)}%"></div></div><span style="font-size:11px;color:var(--color-text-secondary);min-width:44px;text-align:right;">${w.swimM}m</span></div>
      <div class="progress-row"><span class="progress-label">Bike</span><div class="progress-bar-bg"><div class="progress-fill progress-bike" style="width:${Math.round((w.bikeMin/maxBike)*100)}%"></div></div><span style="font-size:11px;color:var(--color-text-secondary);min-width:44px;text-align:right;">${w.bikeMin} min</span></div>
      <div class="progress-row"><span class="progress-label">Run</span><div class="progress-bar-bg"><div class="progress-fill progress-run" style="width:${Math.round((w.runMin/maxRun)*100)}%"></div></div><span style="font-size:11px;color:var(--color-text-secondary);min-width:44px;text-align:right;">${w.runMin} min</span></div>
    </div>
    <div class="days-grid">
      ${w.days.map(d => `
        <div class="day-card${d.isRaceDay ? ' race-day' : d.isRest ? ' rest-day' : ''}">
          <span class="day-label">${d.label}</span>
          <div class="day-content">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
              <span class="day-name">${d.name}</span>
              <span>${d.pills.map(p => `<span class="pill ${pillMap[p]}">${pillLabel[p]}</span>`).join("")}</span>
            </div>
            <p class="day-desc">${d.desc}</p>
          </div>
        </div>
      `).join("")}
    </div>
    <div class="tips-section">
      <p class="tips-title"><i class="ti ti-bulb" aria-hidden="true"></i> Tips for this week</p>
      <ul class="tips-list">
        ${w.tips.map(t => `<li>${t}</li>`).join("")}
      </ul>
    </div>
  `;
}

function setWeek(num) {
  currentWeek = num;
  renderTabs();
  renderWeek(weeks[num - 1]);
}

function jumpToPhase(phase) {
  const firstWeek = weeks.find(w => w.phase === phase);
  if (firstWeek) setWeek(firstWeek.num);
}

setWeek(1);
</script>
